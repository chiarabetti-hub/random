<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lancio Moneta Minimal</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Helvetica, Arial, sans-serif;
    }

    body {
      background: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #ffffff;
    }

    .tool-box {
      width: 400px;
      height: 400px;
      border: 1px solid #ffffff;
      background: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 50px;
    }

    .coin-container {
      perspective: 1000px;
      width: 140px;
      height: 140px;
      margin-bottom: 40px;
    }

    .coin {
      width: 140px;
      height: 140px;
      position: relative;
      transform-style: preserve-3d;
      will-change: transform;
    }

    .face {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.2rem;
      font-weight: 500;
      letter-spacing: 2px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .heads {
      background: #fff;
      color: #000000;
    }

    .tails {
      background: #111;
      color: #fff;
      transform: rotateY(180deg);
    }

    button {
      border: 1px solid #000000;
      background: #fff;
      color: #111;
      padding: 12px 28px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.5px;
    }

    button:hover:not(:disabled) {
      background: #111;
      color: #fff;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <div class="tool-box">
    <h1>Lancio Moneta</h1>

    <div class="coin-container">
      <div class="coin" id="coin">
        <div class="face heads">TESTA</div>
        <div class="face tails">CROCE</div>
      </div>
    </div>

    <button id="flipBtn">LANCIA</button>
  </div>

  <script>
    const coin = document.getElementById("coin");
    const button = document.getElementById("flipBtn");

    let flipping = false;
    let currentRotation = 0;

    function randomCoinSide() {
      const randomArray = new Uint32Array(1);
      crypto.getRandomValues(randomArray);
      return randomArray[0] % 2 === 0 ? "TESTA" : "CROCE";
    }

    function flipCoin() {
      if (flipping) return;
      flipping = true;
      button.disabled = true;

      const result = randomCoinSide();
      const spins = Math.floor(Math.random() * 4) + 6;
      currentRotation += spins * 360;
      if (result === "CROCE") {
        currentRotation += 180;
      }

      coin.style.transition = "none";
      coin.offsetHeight;
      coin.style.transition = "transform 1.8s cubic-bezier(0.2,0.8,0.2,1)";
      coin.style.transform = `rotateY(${currentRotation}deg)`;

      setTimeout(() => {
        flipping = false;
        button.disabled = false;
      }, 1850);
    }

    button.addEventListener("click", flipCoin);
  </script>

</body>
</html>
