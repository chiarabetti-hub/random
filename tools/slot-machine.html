<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Slot Machine Minimal</title>

<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Helvetica, Arial, sans-serif;
  }

  body{
    background:#000000;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:#ffffff;
  }

  .tool-box{
    width:450px;
    height:450px;
    border:1px solid #fffefe;
    background:#000000;
    position:relative;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }

  .machine-frame{
    position:absolute;
    inset:18px;
    border:1px solid #ffffff;
    pointer-events:none;
  }

  h1{
    font-size:1.8rem;
    font-weight:800;
    letter-spacing:-1px;
    margin-bottom:45px;
  }

  .slot-wrapper{
    border:2px solid #ffffff;
    padding:24px;
    display:flex;
    gap:18px;
    margin-bottom:40px;
    background:#000000;
  }

  .slot{
    width:100px;
    height:120px;
    border:2px solid #ffffff;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:#000000;
  }

  .slot-value{
    font-size:3.6rem;
    font-weight:700;
    user-select:none;
  }

  .lever-system{
    position:absolute;
    right:42px;
    top:85px;
    width:70px;
    height:240px;
  }

  .lever-track{
    position:absolute;
    right:18px;
    top:0;
    width:12px;
    height:180px;
    background:#ffffff;
    border-radius:999px;
  }

  .lever-knob{
    position:absolute;
    top:0;
    right:7px;
    width:34px;
    height:34px;
    border:2px solid #ffffff;
    border-radius:50%;
    background:#000000;
    transition:
      transform 320ms
      cubic-bezier(.25,.8,.25,1);
  }

  .lever-knob.pulled{
    transform:translateY(145px);
  }

  button{
    border:1px solid #ffffff;
    background:#000000;
    color:#000000;
    padding:12px 30px;
    font-size:.95rem;
    cursor:pointer;
    transition:.2s ease;
    letter-spacing:.5px;
  }

  button:hover:not(:disabled){
    background:#000000;
    color:#ffffff;
  }

  button:disabled{
    opacity:.4;
    cursor:not-allowed;
  }
</style>
</head>

<body>

<div class="tool-box">

  <div class="machine-frame"></div>

  <h1>Slot Machine</h1>

  <div class="slot-wrapper">
    <div class="slot">
      <div class="slot-value" id="slot1">?</div>
    </div>

    <div class="slot">
      <div class="slot-value" id="slot2">?</div>
    </div>

    <div class="slot">
      <div class="slot-value" id="slot3">?</div>
    </div>
  </div>

  <button id="spinBtn">
    GIRA
  </button>

  <div class="lever-system">
    <div class="lever-track"></div>
    <div class="lever-knob" id="leverKnob"></div>
  </div>

</div>

<script>
  const symbols = [
    "7",
    "★",
    "◆",
    "●",
    "▲",
    "■",
    "✦"
  ];

  const slots = [
    document.getElementById("slot1"),
    document.getElementById("slot2"),
    document.getElementById("slot3")
  ];

  const spinBtn = document.getElementById("spinBtn");
  const leverKnob = document.getElementById("leverKnob");

  let spinning = false;

  function secureRandom(max){
    const arr = new Uint32Array(1);
    crypto.getRandomValues(arr);
    return arr[0] % max;
  }

  function randomSymbol(){
    return symbols[secureRandom(symbols.length)];
  }

  function spinSlot(slot,duration){
    return new Promise(resolve=>{
      const interval = setInterval(()=>{
        slot.textContent = randomSymbol();
      },70);

      setTimeout(()=>{
        clearInterval(interval);
        slot.textContent = randomSymbol();
        resolve();
      },duration);
    });
  }

  async function startSpin(){
    if(spinning) return;
    spinning = true;
    spinBtn.disabled = true;
    leverKnob.classList.add("pulled");

    setTimeout(()=>{
      leverKnob.classList.remove("pulled");
    },320);

    await Promise.all([
      spinSlot(slots[0],1200),
      spinSlot(slots[1],1700),
      spinSlot(slots[2],2200)
    ]);

    spinBtn.disabled = false;
    spinning = false;
  }

  spinBtn.addEventListener("click", startSpin);
</script>

</body>
</html>
